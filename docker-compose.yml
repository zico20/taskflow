# TaskFlow — local development stack.
# Usage: docker compose up --build
#
# Services:
#   db    — PostgreSQL (primary database)
#   redis — reserved for future Redis Pub/Sub WebSocket fan-out (see backend
#           websockets/manager.py TODO). v1 broadcasting is in-memory; Redis is
#           wired here so scaling out is a config change, not an infra change.
#   api   — FastAPI backend (runs migrations on start, then uvicorn)
#   web   — Next.js frontend

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://taskflow:taskflow@db:5432/taskflow
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me-in-production}
      BACKEND_CORS_ORIGINS: http://localhost:3000
      COOKIE_SECURE: "false"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    entrypoint: ["bash", "docker-entrypoint.sh"]

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
